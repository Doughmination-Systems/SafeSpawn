name: SafeSpawnPlaytime
main: win.doughmination.safespawn.playtime.Main
version: 1.0.0
api-version: '1.21'
description: Playtime plugin for the Safe Spawn Server
author: Doughmination
website: https://modding.dougmination.win/
softdepend:
  - PlaceholderAPI

commands:
  safespawn:
    description: SafeSpawn admin commands
    usage: /safespawn reload
    permission: safespawn.admin
  lobby:
    description: TP to lobby
    usage: /lobby
    permission: safespawn.lobby

permissions:
  safespawn.admin:
    default: op
    description: SafeSpawn admin commands
  safespawn.lobby:
    default: true
    description: Lobby Command