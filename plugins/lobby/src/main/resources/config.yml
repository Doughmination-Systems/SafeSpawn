# Lobby spawn location — edit these to match your world
spawn:
  world: world
  x: 0.5
  y: 64.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# Void rescue — teleport players back to spawn if they fall below this Y level
void-rescue:
  trigger-y: -9